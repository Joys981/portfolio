<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeStore | E-commerce IA-Ready</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.2);
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #26262b;
            --danger: #ef4444;
            --success: #10b981;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
        .hidden { display: none !important; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface); border-color: var(--primary); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { opacity: 0.8; }

        /* Nouveau style pour le lien de retour */
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }

        nav { position: sticky; top: 0; background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 1000; height: 70px; display: flex; align-items: center; }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo { font-size: 1.4rem; font-weight: 800; cursor: pointer; }
        .logo span { color: var(--primary); }
        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-badge { position: absolute; top: -8px; right: -12px; background: var(--primary); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        .hero { padding: 4rem 0; text-align: center; border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1rem; }
        .hero p { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 3rem 0; }
        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { border-color: var(--primary); }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #222; }
        .product-info { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 1.1rem; font-weight: 600; }
        .product-price { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin: 0.5rem 0 1rem; }
        .product-info .btn { align-self: flex-start; }

        .checkout-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; padding: 3rem 0; }
        .checkout-section { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .checkout-title { font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-info h4 { font-size: 1rem; }
        .cart-item-info p { color: var(--text-dim); font-size: 0.9rem; }
        .cart-total { margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid var(--border); display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 800; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; }
        input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 0.8rem; border-radius: 8px; color: #fff; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        @media (max-width: 850px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
        @media (max-width: 550px) {
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <!-- Partie gauche : lien retour + logo -->
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="index.html" class="back-link">← Portfolio</a>
                <div class="logo" onclick="showPage('home')">VIBE<span>STORE</span></div>
            </div>
            <!-- Partie droite : panier + paiement -->
            <div class="nav-actions">
                <div class="cart-icon" onclick="showPage('checkout')">
                    🛒 <span class="cart-badge" id="cart-count">0</span>
                </div>
                <button class="btn btn-primary" onclick="showPage('checkout')">Payer</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Page Accueil -->
        <div id="page-home">
            <section class="hero">
                <h1>Équipez votre <span style="color: var(--primary)">Vibe</span></h1>
                <p>Des composants hardware et assets software optimisés pour le développement moderne assisté par IA.</p>
            </section>

            <div class="products-grid" id="products-container">
                <!-- Rempli par JS -->
            </div>
        </div>

        <!-- Page Checkout -->
        <div id="page-checkout" class="hidden">
            <div class="checkout-container">
                <!-- Formulaire -->
                <div class="checkout-section">
                    <h2 class="checkout-title">Informations de livraison</h2>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label>Adresse de livraison</label>
                            <input type="text" id="address" placeholder="123 Rue de la Vibe, Paris" required>
                        </div>
                        <div class="form-group">
                            <label>Mode de paiement</label>
                            <select id="payment">
                                <option value="cb">Carte Bancaire</option>
                                <option value="paypal">PayPal</option>
                                <option value="mobile">Mobile Money</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                            Valider la commande
                        </button>
                        <button type="button" class="btn btn-outline" onclick="showPage('home')" style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                            Retour aux achats
                        </button>
                    </form>
                </div>

                <!-- Résumé Panier -->
                <div class="checkout-section">
                    <h2 class="checkout-title">Votre Panier</h2>
                    <div id="cart-items-list">
                        <!-- Rempli par JS -->
                    </div>
                    <div class="cart-total">
                        <span>Total</span>
                        <span id="cart-total-amount">0.00 €</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Produits avec vos images locales
        const products = [
            { id: 1, name: "Clavier Mécanique Vibe", price: 129.99, img: "clavier.jpeg", alt: "Clavier mécanique" },
            { id: 2, name: "Écran 4K Ultra-Wide", price: 499.00, img: "ecran.jpeg", alt: "Écran 4K" },
            { id: 3, name: "Souris Ergonomique IA", price: 85.50, img: "souris.jpeg", alt: "Souris ergonomique" },
            { id: 4, name: "Casque Audio Hi-Fi", price: 210.00, img: "casque.jpeg", alt: "Casque audio" },
            { id: 5, name: "Microphone Streamer", price: 150.00, img: "micro.jpeg", alt: "Microphone" },
            { id: 6, name: "Lampe de Bureau LED", price: 45.00, img: "lampe.jpeg", alt: "Lampe LED" }
        ];

        let cart = [];

        function init() {
            renderProducts();
            updateCartUI();
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.img}" alt="${p.alt || p.name}" class="product-img" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-name">${p.name}</h3>
                        <p class="product-price">${p.price.toFixed(2)} €</p>
                        <button class="btn btn-primary" onclick="addToCart(${p.id})">Ajouter au panier</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            const badge = document.getElementById('cart-count');
            badge.style.transform = "scale(1.3)";
            setTimeout(() => badge.style.transform = "scale(1)", 200);
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalQty;

            const list = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('cart-total-amount');

            if (cart.length === 0) {
                list.innerHTML = '<p style="color: var(--text-dim); text-align: center; padding: 1rem 0;">Votre panier est vide.</p>';
                totalDisplay.innerText = "0.00 €";
                return;
            }

            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>${item.qty} x ${item.price.toFixed(2)} €</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <span style="font-weight: bold;">${(item.qty * item.price).toFixed(2)} €</span>
                        <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; line-height: 1;">&times;</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            totalDisplay.innerText = total.toFixed(2) + " €";
        }

        function showPage(pageId) {
            const home = document.getElementById('page-home');
            const checkout = document.getElementById('page-checkout');
            if (pageId === 'home') {
                home.classList.remove('hidden');
                checkout.classList.add('hidden');
            } else {
                home.classList.add('hidden');
                checkout.classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (cart.length === 0) {
                alert("Votre panier est vide !");
                return;
            }
            const name = document.getElementById('name').value;
            const total = document.getElementById('cart-total-amount').innerText;
            const method = document.getElementById('payment').options[document.getElementById('payment').selectedIndex].text;
            alert(`
                🚀 Commande validée !
                -------------------
                Client : ${name}
                Total : ${total}
                Paiement : ${method}
                
                Merci pour votre achat sur VibeStore.
            `);
            cart = [];
            updateCartUI();
            this.reset();
            showPage('home');
        });

        init();
    </script>
</body>
</html>
